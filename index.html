<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pastil ni Mama</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-label">Lutuin namin para sa inyo</div>
    <h1>Pastil ni Mama</h1>
    <p>Masarap, mura, at puso sa bawat subo.</p>
    <div class="header-divider"></div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('menu')">Menu</button>
    <button class="tab" onclick="switchTab('order')">My Order</button>
    <button class="tab" onclick="switchTab('email')">Send Order</button>
  </div>

  <!-- Menu Tab -->
  <div id="tab-menu" class="section visible">
    <div class="menu-grid" id="menuGrid"></div>
    <div class="cart-bar" id="cartBar" style="margin-top:20px;">
      <button class="cart-btn" id="cartBtn" onclick="switchTab('order')" style="display:none;">
        <span>View Order</span>
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
    </div>
  </div>

  <!-- Order/Receipt Tab -->
  <div id="tab-order" class="section">
    <div id="emptyOrder" class="empty-state">
      <div class="icon">🍱</div>
      <p>Wala pang order. Pumili ka muna sa menu!</p>
    </div>
    <div id="receiptWrap" style="display:none;">
      <div class="receipt-card">
        <div class="receipt-header">
          <div class="receipt-title">Resibo</div>
          <div class="receipt-stamp" id="receiptTime"></div>
        </div>
        <div id="receiptLines"></div>
        <div class="receipt-total-row">
          <div class="receipt-total-label">Total</div>
          <div class="receipt-total-amount" id="receiptTotal">₱0</div>
        </div>
        <div class="payment-section">
          <div class="payment-label">Bayad</div>
          <div class="payment-input-row">
            <div class="peso-input-wrap">
              <span class="peso-symbol">₱</span>
              <input type="number" class="peso-input" id="bayadInput" placeholder="0" min="0">
            </div>
            <button class="pay-btn" onclick="computeChange()">Sukli</button>
          </div>
          <div class="change-display" id="changeDisplay">
            <div class="change-label" id="changeLabel">Sukli</div>
            <div class="change-amount" id="changeAmount"></div>
          </div>
        </div>
        <button class="new-order-btn" onclick="resetOrder()">Bagong Order</button>
      </div>
    </div>
  </div>

  <!-- Email Tab -->
  <div id="tab-email" class="section">
    <div class="email-card">
      <h2>I-submit ang Order</h2>
      <p>Ipadala ang inyong order sa amin at makikipag-ugnayan kami sa inyo.</p>
      <div class="form-group">
        <label>Pangalan</label>
        <input type="text" id="eName" placeholder="Juan dela Cruz">
      </div>
      <div class="form-group">
        <label>Detalye ng Order</label>
        <input type="text" id="eOrder" placeholder="2 Pater, 3 Siomai...">
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" id="eAddress" placeholder="Brgy. Example, QC">
      </div>
      <button class="submit-btn" onclick="submitOrder()">I-submit ang Order</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="script.js"></script>
</body>
</html>
